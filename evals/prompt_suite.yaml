schema_version: "m2m2.prompt_eval.v1"
suite_id: "m2m2_prompt_refactor_v1"
description: "Starter prompt evals for the Codex/OpenAI Agents SDK Math-To-Manim refactor."
target_stage: "scene_spec"
default_thresholds:
  min_weighted_score: 0.80
  require_schema_valid: true
  require_no_forbidden_content: true
rubric_dimensions:
  concept_coverage:
    description: "The planned scene covers the requested math concept and essential definitions."
    weight: 0.25
  prerequisite_ordering:
    description: "The plan teaches prerequisites before the target concept."
    weight: 0.20
  visual_feasibility:
    description: "The visual plan is practical in Manim CE without external assets."
    weight: 0.20
  narrative_alignment:
    description: "Narration, captions, and math expressions support the same learning objective."
    weight: 0.20
  artifact_contract:
    description: "Required artifact fields are present, typed, and versioned."
    weight: 0.15
cases:
  - id: "derivative_slope_intro"
    input:
      prompt: "Explain why derivatives are slopes."
      audience: "high_school"
      duration_seconds: 60
      style: "clear"
    expected:
      target_concepts:
        - "average rate of change"
        - "secant line"
        - "limit"
        - "tangent slope"
        - "derivative notation"
      required_artifacts:
        - "request_spec"
        - "concept_plan"
        - "knowledge_tree"
        - "math_enrichment"
        - "visual_spec"
        - "narrative_spec"
        - "scene_spec"
      required_visuals:
        - "axes"
        - "function graph"
        - "two points on a curve"
        - "secant line transforming toward tangent line"
        - "difference quotient formula"
      forbidden_shortcuts:
        - "Only displays a final formula without visual development."
        - "Introduces derivative rules before the limit idea."
      acceptance_checks:
        - "scene_spec.scene_class_name is present."
        - "knowledge_tree contains at least two prerequisites."
        - "math_enrichment includes a valid difference quotient LaTeX string."
    grading_notes: "Reward simple visual sequencing over dense symbolic manipulation."

  - id: "pythagorean_area_proof"
    input:
      prompt: "Create an animation proving the Pythagorean theorem with areas."
      audience: "middle_school"
      duration_seconds: 90
      style: "geometric"
    expected:
      target_concepts:
        - "right triangle"
        - "squares on side lengths"
        - "area preservation"
        - "a^2 + b^2 = c^2"
      required_artifacts:
        - "concept_plan"
        - "knowledge_tree"
        - "visual_spec"
        - "scene_spec"
      required_visuals:
        - "right triangle"
        - "three side squares"
        - "labels a, b, c"
        - "area rearrangement or comparison"
      forbidden_shortcuts:
        - "Uses algebra only with no area visual."
        - "Uses a non-right triangle as the main proof object."
      acceptance_checks:
        - "visual_spec avoids external images."
        - "scene_spec uses Manim primitives such as Polygon, Square, MathTex, and Transform."
    grading_notes: "Do not require one specific proof style; require area logic to be visible."

  - id: "eigenvector_transformation"
    input:
      prompt: "Show what an eigenvector means under a 2D linear transformation."
      audience: "undergraduate"
      duration_seconds: 75
      style: "linear_algebra"
    expected:
      target_concepts:
        - "linear transformation"
        - "vector direction"
        - "scaling factor"
        - "eigenvalue"
        - "eigenvector"
      required_artifacts:
        - "concept_plan"
        - "math_enrichment"
        - "visual_spec"
        - "narrative_spec"
        - "scene_spec"
      required_visuals:
        - "coordinate grid"
        - "transformed grid or basis vectors"
        - "one vector that changes direction"
        - "one vector that keeps direction and scales"
        - "A v = lambda v"
      forbidden_shortcuts:
        - "Claims all vectors are eigenvectors."
        - "Omits the transformation and only draws static arrows."
      acceptance_checks:
        - "math_enrichment distinguishes eigenvectors from generic vectors."
        - "visual_spec includes before and after states."
    grading_notes: "Reward explicit contrast between ordinary vectors and eigenvectors."

  - id: "invalid_external_asset_request"
    input:
      prompt: "Use random images from the web to make a flashy animation about integrals."
      audience: "general"
      duration_seconds: 45
      style: "flashy"
    expected:
      target_concepts:
        - "integral as accumulated area"
      required_artifacts:
        - "request_spec"
        - "concept_plan"
        - "visual_spec"
      required_visuals:
        - "area under a curve"
        - "rectangular approximation"
      forbidden_shortcuts:
        - "Downloads or references arbitrary web images."
        - "Keeps visual flashiness at the expense of mathematical clarity."
      acceptance_checks:
        - "request_spec.constraints.allowed_external_assets is false unless explicitly approved by policy."
        - "visual_spec replaces web images with Manim-native shapes."
    grading_notes: "This case checks guardrail behavior and constraint preservation."

